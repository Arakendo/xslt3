name: Close external PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    if: github.event.pull_request.author_association != 'OWNER' && github.event.pull_request.author_association != 'MEMBER' && github.event.pull_request.author_association != 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - name: Close PR with message
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "Thanks for your interest in **@arakendo/weaver-xslt**!",
                "",
                "This project is open source (MIT) but **does not accept external contributions**.",
                "See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for details.",
                "",
                "You are welcome to fork the repository and modify it under the MIT License."
              ].join("\n")
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed"
            });
