name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        if: runner.os != 'Windows'
        run: npm test

      - name: Test
        if: runner.os == 'Windows'
        run: npm test -- --pool=forks --poolOptions.forks.singleFork --no-file-parallelism

      - name: Test Remaining Windows Slice
        if: runner.os == 'Windows'
        run: npm test -- test/cli.test.ts test/golden.test.ts test/smoke.test.ts test/conformance test/xpath test/xslt --pool=forks --poolOptions.forks.singleFork --no-file-parallelism

      - name: Build
        run: npm run build
