site_name: Weaver
site_description: TypeScript-native XSLT compiler with inspectable generated TypeScript, diagnostics-first design, and an interpreter reference backend.
site_url: https://weaverxslt.org/
repo_url: https://github.com/Arakendo/weaver-xslt
repo_name: Arakendo/weaver-xslt

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  icon:
    logo: material/transit-connection-variant

nav:
  - Home: index.md
  - Workbench: WORKBENCH.md
  - Differentiators: DIFFERENTIATORS.md
  - Architecture: ARCHITECTURE.md
  - Roadmap: ROADMAP.md
  - Progress Artifacts: PROGRESS_ARTIFACTS.md
  - Errors: ERRORS.md
  - XPath: XPATH.md
  - Semantic Boundaries: SEMANTIC_BOUNDARIES.md
  - URI Resolution: URI_RESOLUTION.md
  - Native Execution Boundary: NATIVE_EXECUTION_BOUNDARY.md
  - Native Plan Boundary: NATIVE_PLAN_BOUNDARY.md
  - Native Execution Checklist: NATIVE_EXECUTION_CHECKLIST.md
  - Workbench API: WORKBENCH_API.md
  - Workbench Embed: WORKBENCH_EMBED.md
  - Workbench Checklist: WORKBENCH_CHECKLIST.md
  - Workbench Evidence: WORKBENCH_EVIDENCE.md
  - XML Node Debugging: XML_NODE_DEBUGGING.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - assets/workbench/app.css

extra_javascript:
  - assets/workbench/app.js

extra:
  generator: false